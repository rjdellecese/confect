# Bun runs the fast TypeScript Claude Code hooks (scripts/hooks/*.ts). Pinned for
# reproducibility across machines and CI. Node and pnpm versions come from the
# idiomatic version files (.node-version, package.json "packageManager").
[tools]
bun = "1.3.14"

[settings]
idiomatic_version_file_enable_tools = ["node", "pnpm"]

[hooks]
enter = """
if [ ! -d "$MISE_PROJECT_ROOT/node_modules" ]; then
  echo "Installing Node dependencies with pnpm..."
  (cd "$MISE_PROJECT_ROOT" && pnpm install)
fi
"""
