packages:
  - packages/*
  - apps/*

allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  bun: true
  esbuild: false
  msgpackr-extract: false
  opensrc: false
  puppeteer: false
  sharp: true

overrides:
  convex: 1.33.1
  effect: 3.19.19
  react: 19.2.4
  react-dom: 19.2.4

packageExtensions:
  "@mintlify/mdx":
    peerDependencies:
      react: "*"
      react-dom: "*"
  "next-mdx-remote-client":
    peerDependencies:
      react: "*"
      react-dom: "*"

peerDependencyRules:
  allowedVersions:
    react: "19"
    react-dom: "19"
