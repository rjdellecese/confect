name: Example

on:
  push:
    branches:
      - main
      - v10
  pull_request:
    branches:
      - main
      - v10

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/example-setup
      - run: pnpm format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/example-setup
      - run: pnpm --filter example typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/example-setup
      - run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/example-setup
      - run: pnpm --filter example build

  codegen:
    name: Codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/example-setup
      - run: pnpm exec vp run --filter example codegen
      - uses: ./.github/actions/verify-codegen-committed
        with:
          path: apps/example
