name: "Confect Packages Setup"
description: "Sets up Node.js and pnpm for the confect packages"
author: "Confect"

runs:
  using: "composite"
  steps:
    - name: Get pnpm version from package.json
      id: pnpm-version
      shell: bash
      run: echo "pnpm_version=$(node -p 'require(`./package.json`).engines.pnpm')" >> $GITHUB_OUTPUT

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ steps.pnpm-version.outputs.pnpm_version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: "package.json"
        cache: "pnpm"

    - name: Install dependencies
      run: pnpm install
      shell: bash

    - name: Build Confect packages
      run: pnpm --filter "@confect/*" build
      shell: bash

    # `pnpm install` runs before the workspace packages are built, so
    # workspace bins (e.g. `confect` from `@confect/cli`) fail to link
    # the first time around because their `dist/index.mjs` entry points
    # don't yet exist. Re-run install post-build so those bins end up in
    # every consumer's `node_modules/.bin/`.
    - name: Relink workspace bins
      run: pnpm install --frozen-lockfile --prefer-offline
      shell: bash
