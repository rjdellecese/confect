name: Packages

on:
  push:
    branches:
      - main
      - v9
  pull_request:
    branches:
      - main
      - v9

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          [
            "@confect/cli",
            "@confect/core",
            "@confect/js",
            "@confect/server",
            "@confect/react",
            "@confect/test",
          ]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/confect-setup
      - run: pnpm --filter ${{ matrix.package }} format

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          [
            "@confect/cli",
            "@confect/core",
            "@confect/js",
            "@confect/server",
            "@confect/react",
            "@confect/test",
          ]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/confect-setup
      - run: pnpm --filter ${{ matrix.package }} typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          [
            "@confect/cli",
            "@confect/core",
            "@confect/js",
            "@confect/server",
            "@confect/react",
            "@confect/test",
          ]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/confect-setup
      - run: pnpm --filter ${{ matrix.package }} lint

  workspace-lint:
    name: Workspace lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/confect-setup
      - run: pnpm lint:syncpack
      - run: pnpm format:syncpack
      - run: pnpm format:claude
      - run: pnpm lint:metadata

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [cli, core, js, server]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/confect-setup
      - run: cd packages/${{ matrix.package }} && pnpm test

  test-mock-backend:
    name: Test (mock-backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/confect-setup
      - run: pnpm --filter @confect/server test:mock-backend
      - name: Verify codegen output is committed
        run: git diff --exit-code -- packages/server/test/mock-backend/fixtures

  test-local-backend:
    name: Test (local-backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/confect-setup
      - name: Cache convex local-backend binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/convex/binaries
          key: convex-local-backend-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            convex-local-backend-${{ runner.os }}-
      - run: pnpm --filter @confect/server test:local-backend
      - name: Verify codegen output is committed
        run: git diff --exit-code -- packages/server/test/local-backend/fixtures

  bench:
    name: Bench
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ["@confect/core", "@confect/server"]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/confect-setup
      - run: pnpm --filter ${{ matrix.package }} bench

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          [
            "@confect/cli",
            "@confect/core",
            "@confect/js",
            "@confect/server",
            "@confect/react",
            "@confect/test",
          ]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/confect-setup
      - run: pnpm --filter ${{ matrix.package }} build
