packages:
  - packages/*
  - apps/*
  - packages/server/test/mock-backend/fixtures
  - packages/server/test/local-backend/fixtures

# Don't install a registry version until it's at least 3 days old (in minutes).
# Supply-chain protection: a compromised release is usually yanked within
# hours. pnpm 11 defaults this to 1440 (1 day); we widen it. Workspace
# (`workspace:`) deps are unaffected. To take a blocked version deliberately
# (e.g. a fresh security fix), override per-install: `--config.minimumReleaseAge=0`.
minimumReleaseAge: 4320

allowBuilds:
  "@parcel/watcher": false
  "@swc/core": false
  esbuild: false
  msgpackr-extract: false
  opensrc: false
  puppeteer: false
  sharp: true

overrides:
  convex: 1.40.0
  effect: 3.21.2
  "@effect/typeclass": 0.40.0
  react: 19.2.4
  react-dom: 19.2.4

packageExtensions:
  "@mintlify/mdx":
    peerDependencies:
      react: "*"
      react-dom: "*"
  "next-mdx-remote-client":
    peerDependencies:
      react: "*"
      react-dom: "*"

peerDependencyRules:
  allowedVersions:
    react: "19"
    react-dom: "19"
