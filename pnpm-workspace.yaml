packages:
  - packages/*
  - apps/*
  - packages/server/test/mock-backend/fixtures
  - packages/server/test/local-backend/fixtures

allowBuilds:
  "@parcel/watcher": false
  "@swc/core": false
  esbuild: false
  msgpackr-extract: false
  opensrc: false
  puppeteer: false
  sharp: true

overrides:
  convex: 1.40.0
  effect: 4.0.0-beta.98
  react: 19.2.4
  react-dom: 19.2.4

packageExtensions:
  "@mintlify/mdx":
    peerDependencies:
      react: "*"
      react-dom: "*"
  "next-mdx-remote-client":
    peerDependencies:
      react: "*"
      react-dom: "*"

peerDependencyRules:
  allowedVersions:
    react: "19"
    react-dom: "19"
