name: Example

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/example-setup
      - run: pnpm format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/example-setup
      - run: pnpm --filter example typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/example-setup
      - run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/example-setup
      - run: pnpm --filter example build

  codegen:
    name: Codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/example-setup
      # Regenerate the example app's Confect codegen output
      # (`confect/_generated/` and the wrapper modules under `convex/`).
      - run: pnpm --filter example exec confect codegen
      - name: Verify codegen output is committed
        run: |
          git add --all --intent-to-add -- apps/example
          git diff --exit-code -- apps/example
